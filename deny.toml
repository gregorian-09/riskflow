[graph]
all-features = true

[advisories]
db-path = "target/advisory-dbs"
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "paste is pulled transitively by nalgebra 0.33.x, which preserves the workspace Rust 1.85 MSRV; revisit when nalgebra can be upgraded." },
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
allow-workspace = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
