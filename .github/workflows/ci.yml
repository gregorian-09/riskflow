name: ci

on:
  pull_request:
  push:
    branches:
      - master
      - main

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features

      - name: Docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps

      - name: Boundary
        run: |
          cargo tree -p risk-pretrade --prefix none > pretrade-tree.txt
          ! grep -E '^risk-options ' pretrade-tree.txt
          cargo tree -p risk-portfolio --prefix none > portfolio-tree.txt
          ! grep -E '^risk-options ' portfolio-tree.txt
